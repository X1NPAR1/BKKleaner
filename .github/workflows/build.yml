name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BKKleaner.slnx

      - name: Build
        run: dotnet build BKKleaner.slnx -c Release --no-restore

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: bin/Release/net9.0-windows/
          retention-days: 7
