name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test BKKleaner.slnx -c Release

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish BKKleaner.csproj -c Release -r win-x64 --self-contained true
          -o publish/win-x64

      - name: Validate publish output
        shell: pwsh
        run: |
          foreach ($f in @("BKKleaner.exe", "Localization\en.json", "Localization\tr.json", "logo.ico")) {
            if (-not (Test-Path "publish/win-x64/$f")) { throw "Missing: $f" }
          }

      - name: Package portable zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Compress-Archive -Path publish/win-x64/* -DestinationPath artifacts/BKKleaner-win-x64.zip

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Installer\BKKleaner.iss

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/BKKleaner-win-x64.zip
            artifacts/BKKleaner-Setup-*.exe
          generate_release_notes: true
          draft: false
