name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Test
        run: dotnet test BKKleaner.slnx -c Release

      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish BKKleaner.csproj -c Release -r win-x64 --self-contained true
          -o publish/win-x64

      - name: Validate publish output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          foreach ($f in @("BKKleaner.exe", "Localization\en.json", "Localization\tr.json", "logo.ico")) {
            if (-not (Test-Path "publish/win-x64/$f")) { throw "Missing: $f" }
          }

      - name: Build installer (.exe via Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" Installer\BKKleaner.iss

      - name: Build installer (.msi via WiX)
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 5.0.2
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
          wix extension add -g WixToolset.UI.wixext/5.0.2
          $root = (Get-Location).Path
          wix build Installer\BKKleaner.wxs -ext WixToolset.UI.wixext `
            -d PublishDir="$root\publish\win-x64" -b "$root" -b "$root\Installer" `
            -arch x64 -o artifacts\BKKleaner-3.6.1.msi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/BKKleaner-Setup-3.6.1.exe
            artifacts/BKKleaner-3.6.1.msi
          generate_release_notes: true
          draft: false
